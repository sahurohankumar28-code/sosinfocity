<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SOS Infocity</title>
    <link rel="icon" href="images/logo.png" type="image/png" sizes="32x32">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/apply.css">
</head>
<body>

    <!-- Splash Screen Overlay -->
<div id="splash-screen">
  <div class="splash-content">
    <!-- Splash Video -->
    <video id="splash-video" autoplay muted playsinline>
      <source src="videos/sos.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</div>

    <div class="hero-header">
      <div class="container">
        <div id="header-placeholder"></div>

        <div style="margin-top: 40px">
          <h1>Application Gateway</h1>
          <p>
            Submit your credentials to sync with our core engineering matrix.
          </p>
        </div>
      </div>
    </div>
        

    <section class="application-form-section">
        <div class="container split-form-layout">
            
            <div class="form-card-container">
                <form id="applicationForm" class="premium-interactive-form" action="process_application.php" method="POST" enctype="multipart/form-data">
                    
                    <div class="form-header-tracking">
                        <span class="section-tag">Application Gateway</span>
                        <h2 id="activeRoleHeader">General Application Pipeline</h2>
                    </div>

                    <div class="form-step-panel active" data-step="1">
                        <div class="form-group">
                            <label for="candidateName">Name *</label>
                            <div class="input-with-icon">
                                <input type="text" id="candidateName" name="candidateName" placeholder="Enter Full Name" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="candidateEmail">Email *</label>
                            <div class="input-with-icon">
                                <input type="email" id="candidateEmail" name="candidateEmail" placeholder="name@domain.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="callNumber">Contact Number *</label>
                            <div class="input-with-icon">
                                <input type="tel" id="callNumber" name="callNumber" placeholder="Enter Contact Number" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="whatsappNumber">WhatsApp Number *</label>
                            <div class="input-with-icon">
                                <input type="tel" id="whatsappNumber" name="whatsappNumber" placeholder="Enter WhatsApp Number" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="addressDetails">Address *</label>
                            <div class="input-with-icon">
                                <input type="text" id="addressDetails" name="addressDetails" placeholder="Enter Residential Address" required>
                            </div>
                        </div>

                        <input type="hidden" id="appliedRole" name="appliedRole" value="">

                        <div class="form-action-row">
                            <button type="button" class="btn-form-nav primary next-step-btn">Continue to Experience</button>
                        </div>
                    </div>

                    <div class="form-step-panel" data-step="2">
                        <div class="form-group">
                            <label style="margin-bottom: 12px; display: block;">Do you have prior job experience? *</label>
                            <div class="experience-toggle-container">
                                <label class="toggle-option">
                                    <input type="radio" name="hasExperience" value="No" checked>
                                    <span class="toggle-pill">No</span>
                                </label>
                                <label class="toggle-option">
                                    <input type="radio" name="hasExperience" value="Yes">
                                    <span class="toggle-pill">Yes</span>
                                </label>
                            </div>
                        </div>

                        <div class="form-group conditional-exp-field" id="experienceDetailsBlock">
                            <label for="experienceDetails">Enter Experience Details</label>
                            <div class="input-with-icon">
                                <textarea id="experienceDetails" name="experienceDetails" rows="4" placeholder="List your previous roles, roles metrics, and timelines..."></textarea>
                            </div>
                        </div>

                        <div class="form-action-row">
                            <button type="button" class="btn-form-nav secondary prev-step-btn">Back</button>
                            <button type="button" class="btn-form-nav primary next-step-btn">Continue to Links</button>
                        </div>
                    </div>

                    <div class="form-step-panel" data-step="3">
                        <div class="form-group">
                            <label for="linkedinUrl">LinkedIn Profile (If any)</label>
                            <div class="input-prefix-group">
                                <span class="input-prefix">linkedin.com/in/</span>
                                <input type="text" id="linkedinUrl" name="linkedinUrl" placeholder="username">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Upload Resume *</label>
                            <div class="file-drop-zone" id="dropZone">
                                <input type="file" id="resumeFile" name="resumeFile" accept=".pdf,.docx" required>
                                <div class="drop-zone-content">
                                    <i class="fas fa-cloud-arrow-up" style="font-size: 1.5rem; color: var(--primary); margin-bottom: 8px;"></i>
                                    <p><span style="color:var(--primary); font-weight: 600;">Click to upload</span> or drag and drop</p>
                                    <p style="font-size: 0.75rem; color: #64748b; margin-top: 4px;">Supported Formats: PDF, DOCX</p>
                                </div>
                            </div>
                            
                            <div class="loaded-file-badge" id="fileBadgeRow" style="display: none;">
                                <div class="file-meta-info">
                                    <i class="fas fa-file-pdf"></i>
                                    <span id="loadedFileName">resume.pdf</span>
                                </div>
                                <button type="button" class="remove-file-btn" id="removeFileAsset"><i class="fas fa-trash-can"></i></button>
                            </div>
                        </div>

                        <div class="form-action-row">
                            <button type="button" class="btn-form-nav secondary prev-step-btn">Back</button>
                            <button type="submit" class="btn-form-nav primary">Submit Application</button>
                        </div>
                    </div>

                </form>

                <div class="step-indicator-dots">
                    <span class="step-dot active" data-indicator="1"></span>
                    <span class="step-dot" data-indicator="2"></span>
                    <span class="step-dot" data-indicator="3"></span>
                </div>
            </div>

            <div class="form-visual-pane">
                <img src="images/apply.jpg" alt="Scalability" loading="lazy" />
            </div>

        </div>
    </section>

    <div id="footer-placeholder"></div>
    
    <script src="js/header-footer.js"></script>
    <script src="js/apply.js"></script>
    
</body>
</html>
