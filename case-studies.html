<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SOS Infocity</title>
    <link rel="icon" href="images/logo.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/case-studies.css">
</head>
<body>

    
<div id="splash-screen">
  <div class="splash-content">
    <video id="splash-video" autoplay muted playsinline>
      <source src="videos/sos.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>
</div>

    <div class="hero-header" id="heroHeader">
        <div class="container">
            <div id="header-placeholder"></div>

            <div class="hero-content" id="heroContent">
                <h1>Enterprise Case Studies</h1>
                <p>
                    Real-world intelligence fields showcasing network optimization, deep machine learning integration, and
                    hardened zero-trust data architectures.
                </p>
            </div>
        </div>
    </div>

    <section class="cs-blog-section" id="caseStudiesSection" style="background: #fafcff; padding: 100px 0;">
        <div class="container">
            <div class="cs-cards-blog-grid" id="blogGridTrack">
                
            </div>
        </div>
    </section>

    <section class="cs-detail-section" id="detailSection" style="display: none; background: #fafcff; padding: 60px 0;">
        <div class="container">
            <button class="back-to-cases" id="backToCases">
                <i class="fas fa-arrow-left"></i> Back to Case Studies
            </button>
            <div class="cs-detail-wrapper" id="detailWrapper">
            </div>
        </div>
    </section>
    
    <div id="footer-placeholder"></div>
    
    <script src="js/header-footer.js"></script>
    <script src="js/case-studies.js"></script>

</body>
</html>
