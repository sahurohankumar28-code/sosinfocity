<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>SOS Infocity</title>
    <link rel="icon" href="images/Logo.png" type="image/png" sizes="32x32" />
    <meta
      name="description"
      content="SOS Infocity delivers AI-driven IT solutions, secure networks..."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="stylesheet" href="./css/gallery.css" />
  </head>
  <body>
    <div class="gallery-hero-header">
      <div class="container">

        <div id="header-placeholder"></div>

        <div class="gallery-intro-pane">
          <h1>
            SOS Good Vibes <br /><span class="highlight-neon"
              >Dynamic Exhibition</span
            >
          </h1>
          <p>
            An immersive look inside our high-performance workspace operations,
            data labs, and regional smart city deployment hubs across India.
          </p>
        </div>
      </div>
    </div>

    <main class="gallery-matrix-section">
      <div class="container">
        <div class="matrix-layout-grid" id="galleryGrid">
          <div class="matrix-card size-tall" data-category="labs">
            <div class="matrix-card-inner">
              <img
                src="images/Logo.png"
                alt="Data Lab Node A"
                class="gallery-img"
              />
            </div>
          </div>

          <div class="matrix-card size-tall" data-category="labs">
            <div class="matrix-card-inner">
              <img
                src="images/Logo.png"
                alt="Data Lab Node A"
                class="gallery-img"
              />
            </div>
          </div>

          <div class="matrix-card size-tall" data-category="labs">
            <div class="matrix-card-inner">
              <img
                src="images/Logo.png"
                alt="Data Lab Node A"
                class="gallery-img"
              />
            </div>
          </div>

          <div class="matrix-card size-tall" data-category="labs">
            <div class="matrix-card-inner">
              <img
                src="images/Logo.png"
                alt="Data Lab Node A"
                class="gallery-img"
              />
            </div>
          </div>

          <div class="matrix-card size-tall" data-category="labs">
            <div class="matrix-card-inner">
              <img
                src="images/Logo.png"
                alt="Data Lab Node A"
                class="gallery-img"
              />
            </div>
          </div>

          <div class="matrix-card size-tall" data-category="labs">
            <div class="matrix-card-inner">
              <img
                src="images/Logo.png"
                alt="Data Lab Node A"
                class="gallery-img"
              />
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="matrix-lightbox" id="matrixLightbox" aria-hidden="true">
      <div class="lightbox-overlay"></div>
      <button class="lightbox-close" id="closeLightbox">
        <i class="fas fa-times"></i>
      </button>
      <div class="lightbox-content-wrapper">
        <img
          src=""
          alt="Enlarged Telemetry Workspace View"
          id="lightboxImage"
        />
        <div class="lightbox-caption" id="lightboxCaption"></div>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="./js/header-footer.js"></script>

    <script src="./js/gallery.js"></script>
    
  </body>
</html>
