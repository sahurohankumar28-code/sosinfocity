<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Infocity - Gallery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body>

    <div id="splash-screen">
      <div class="splash-content">
        <video id="splash-video" autoplay muted playsinline>
          <source src="videos/sos.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>
    </div>

    <div class="hero-header">
      <div class="container">
        <div id="header-placeholder"></div>
        <div style="margin-top: 30px">
          <h1>SOS Good Vibes</h1>
          <p>Life & Culture at SOS Infocity</p>
        </div>
      </div>
    </div>

    <main class="gallery-container">
      <div class="unified-grid">
        <div class="grid-item"><img src="events/photo_1.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_2.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_3.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_4.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_5.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_6.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_7.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_8.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_9.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_10.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_11.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_12.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_13.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_14.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_15.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_16.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_17.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_18.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_19.jpeg" alt="Gallery Photo" loading="lazy"></div>
        <div class="grid-item"><img src="events/photo_20.jpeg" alt="Gallery Photo" loading="lazy"></div>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="js/header-footer.js"></script>
</body>
</html>
